name: Perf Baseline (sitespeed.io via ACI)

# Manual-trigger-only. Runs sitespeed.io inside an Azure Container Instance
# in the chosen region, captures HAR + sitespeed output to an Azure Files
# share, downloads back to the runner, uploads as a GH Action artifact.
#
# One-time prerequisites (see docs/perf-baselines/ci-setup.md):
#   - Storage account `stperftrainsight` in rg-trainsight (already created)
#   - File share `perfbaselines` (already created)
#   - GitHub repo secret STORAGE_ACCOUNT_KEY set to that account's access key
#   - AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID already
#     used by deploy-backend.yml (SP has Contributor on rg-trainsight)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why running this baseline (e.g. "anchor before phase 2" or "after self-host fonts")'
        required: true
        type: string
      probe:
        description: 'Azure region the ACI runs in — three macro-regions matching real audience: APAC/CN, US-West, EU'
        required: false
        type: choice
        default: 'eastasia'
        options:
          - 'eastasia'
          - 'westus'
          - 'northeurope'
      target_url:
        description: 'URL or base URL — for S4 the page to load; for S1/S2/S3 the host without trailing slash (login flow appends /login etc.)'
        required: false
        type: string
        default: 'https://www.praxys.run/'
      scenario:
        description: 'Test scenario — S4=anonymous landing, S1=login→Today, S2=Today→Training, S3=warm-Today repeat'
        required: false
        type: choice
        default: 's4'
        options:
          - 's4'
          - 's1'
          - 's2'
          - 's3'
      device:
        description: 'Device emulation'
        required: false
        type: choice
        default: 'both'
        options:
          - 'desktop'
          - 'mobile'
          - 'both'

permissions:
  contents: read
  id-token: write

env:
  AZ_SUBSCRIPTION: 3ff02750-211c-4579-94a6-8c9af4e6d891
  AZ_RG: rg-trainsight
  STORAGE_ACCOUNT: stperftrainsight
  FILE_SHARE: perfbaselines

jobs:
  resolve-devices:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - id: build
        run: |
          if [ "${{ inputs.device }}" = "both" ]; then
            echo 'matrix=["desktop","mobile"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=["${{ inputs.device }}"]' >> "$GITHUB_OUTPUT"
          fi

  baseline:
    needs: resolve-devices
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.resolve-devices.outputs.matrix) }}
    env:
      CELL: ${{ inputs.scenario }}-${{ inputs.probe }}-${{ matrix.device }}
      CONTAINER_NAME: sitespeed-${{ inputs.scenario }}-${{ inputs.probe }}-${{ matrix.device }}-${{ github.run_id }}-${{ github.run_attempt }}
      # Strip trailing slash so preScripts can do `${baseUrl}/login` etc.
      # without doubling it. target_url's default has a trailing slash for
      # S4 (sitespeed.io accepts it as URL); S1/S2/S3 want the bare host.
      PRAXYS_PERF_BASE_URL: ${{ inputs.target_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload preScripts (S1/S2/S3 only)
        if: inputs.scenario != 's4'
        run: |
          # The preScripts (s1.js etc.) drive Chrome through the login flow.
          # ACI mounts the perfbaselines file share at /sitespeed.io/out, so
          # we put scripts in a `scripts/` subfolder of that share — the
          # container will then see them at /sitespeed.io/out/scripts/.
          # Idempotent (overwrites on every run); not cleaned up between
          # runs (tiny files, OK to leave).
          az storage file upload-batch \
            --subscription "$AZ_SUBSCRIPTION" \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "${{ secrets.STORAGE_ACCOUNT_KEY }}" \
            --destination "$FILE_SHARE" \
            --destination-path "scripts" \
            --source scripts/sitespeed_scripts/

      - name: Build sitespeed.io command-line
        id: cmd
        run: |
          # The image's ENTRYPOINT is /start.sh which prepares Chrome and
          # then execs sitespeed.io. ACI's --command-line *overrides* the
          # entrypoint, so passing "sitespeed.io ..." fails with
          # "executable not found in PATH" — sitespeed.io lives in
          # /usr/src/app/bin/, only added to PATH inside /start.sh.
          # Calling /start.sh directly with the same args restores the
          # image's intended startup flow.
          BASE_ARGS="--outputFolder /sitespeed.io/out/${CELL} -n 3"
          if [ "${{ matrix.device }}" = "mobile" ]; then
            # Viewport only — no UA override. The local runner sets a UA
            # too but ACI's --command-line argv parser splits on
            # whitespace and doesn't honour quoted strings, so a UA value
            # like "Mozilla/5.0 (iPhone; CPU...)" gets shredded into many
            # tokens. For S4 cold-load FCP the UA doesn't change the
            # measurement (Chrome's default mobile UA renders the same
            # CSS path); analytics-driven UA differences are out of scope
            # for synthetic baselines.
            DEVICE_ARGS="--browsertime.viewPort 390x844"
          else
            DEVICE_ARGS=""
          fi
          # S4 = plain URL test. S1/S2/S3 = --multi mode where the JS
          # preScript drives the browser through login then measures the
          # navigation. preScripts read PRAXYS_PERF_BASE_URL +
          # PRAXYS_PERF_USER + PRAXYS_PERF_PASSWORD env vars (set on the
          # ACI below), defaulting to the public demo account.
          if [ "${{ inputs.scenario }}" = "s4" ]; then
            TAIL_ARGS="${{ inputs.target_url }}"
          else
            TAIL_ARGS="--multi /sitespeed.io/out/scripts/${{ inputs.scenario }}.js"
          fi
          echo "args=/start.sh ${TAIL_ARGS} ${BASE_ARGS} ${DEVICE_ARGS}" >> "$GITHUB_OUTPUT"

      - name: Create ACI + wait for completion
        run: |
          set -euo pipefail

          # Strip trailing slash from base URL so preScripts can do
          # ${baseUrl}/login without doubling the slash.
          BASE_URL="${PRAXYS_PERF_BASE_URL%/}"
          # Public demo account — same defaults Landing.tsx ships in its
          # "Try the demo" CTA; not secret. Override via repository secrets
          # PRAXYS_PERF_USER / PRAXYS_PERF_PASSWORD if testing against a
          # non-demo account.
          PERF_USER="${{ secrets.PRAXYS_PERF_USER || 'demo@trainsight.dev' }}"
          PERF_PASS="${{ secrets.PRAXYS_PERF_PASSWORD || 'demo' }}"

          az container create \
            --subscription "$AZ_SUBSCRIPTION" \
            --resource-group "$AZ_RG" \
            --name "$CONTAINER_NAME" \
            --image sitespeedio/sitespeed.io:latest \
            --os-type Linux \
            --location "${{ inputs.probe }}" \
            --cpu 2 --memory 4 \
            --restart-policy Never \
            --azure-file-volume-account-name "$STORAGE_ACCOUNT" \
            --azure-file-volume-account-key "${{ secrets.STORAGE_ACCOUNT_KEY }}" \
            --azure-file-volume-share-name "$FILE_SHARE" \
            --azure-file-volume-mount-path /sitespeed.io/out \
            --environment-variables \
              "PRAXYS_PERF_BASE_URL=$BASE_URL" \
              "PRAXYS_PERF_USER=$PERF_USER" \
              "PRAXYS_PERF_PASSWORD=$PERF_PASS" \
            --command-line "${{ steps.cmd.outputs.args }}" \
            --no-wait

          # Poll until the container exits. ACI's single-run model surfaces
          # state as "Terminated" with an exitCode once the process finishes.
          while true; do
            STATE=$(az container show \
              --subscription "$AZ_SUBSCRIPTION" \
              --resource-group "$AZ_RG" \
              --name "$CONTAINER_NAME" \
              --query "containers[0].instanceView.currentState.state" -o tsv 2>/dev/null || true)
            echo "[$(date -u +%T)] container state: ${STATE:-pending}"
            if [ "$STATE" = "Terminated" ]; then break; fi
            sleep 20
          done

          EXIT_CODE=$(az container show \
            --subscription "$AZ_SUBSCRIPTION" \
            --resource-group "$AZ_RG" \
            --name "$CONTAINER_NAME" \
            --query "containers[0].instanceView.currentState.exitCode" -o tsv)
          echo "container exit code: $EXIT_CODE"

          echo "---- container logs (tail) ----"
          az container logs \
            --subscription "$AZ_SUBSCRIPTION" \
            --resource-group "$AZ_RG" \
            --name "$CONTAINER_NAME" | tail -80

          exit "$EXIT_CODE"

      - name: Download HARs + strip heavy binaries
        run: |
          set -euo pipefail
          mkdir -p baseline-output
          az storage file download-batch \
            --subscription "$AZ_SUBSCRIPTION" \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "${{ secrets.STORAGE_ACCOUNT_KEY }}" \
            --source "$FILE_SHARE" \
            --pattern "${CELL}/*" \
            --destination ./baseline-output/

          # Match the .gitignore pattern in docs/perf-baselines/: keep HAR +
          # light reports, drop videos/filmstrip/screenshots bundles.
          find baseline-output -type d \( -name video -o -name filmstrip -o -name screenshots \) \
            -exec rm -rf {} + 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: baseline-${{ env.CELL }}-${{ github.run_id }}
          path: baseline-output/
          retention-days: 30

      - name: Delete ACI
        if: always()
        run: |
          az container delete \
            --subscription "$AZ_SUBSCRIPTION" \
            --resource-group "$AZ_RG" \
            --name "$CONTAINER_NAME" \
            --yes || true

      - name: Delete downloaded results from Azure Files
        if: always()
        run: |
          # Avoid share filling up; GH artifact is the durable copy.
          az storage file delete-batch \
            --subscription "$AZ_SUBSCRIPTION" \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "${{ secrets.STORAGE_ACCOUNT_KEY }}" \
            --source "$FILE_SHARE" \
            --pattern "${CELL}/*" || true

  summary:
    needs: baseline
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: baseline-collected
          pattern: baseline-*-${{ github.run_id }}
          merge-multiple: true
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run analyzer across all cells
        run: |
          mkdir -p baseline-combined
          if [ -d baseline-collected ] && [ -n "$(ls -A baseline-collected 2>/dev/null)" ]; then
            cp -r baseline-collected/. baseline-combined/
            python scripts/analyze_baseline.py --baseline-dir baseline-combined || true
          else
            echo "No baseline cells produced — earlier jobs failed. Skipping analyzer." >&2
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: baseline-combined-${{ github.run_id }}
          path: baseline-combined/
          retention-days: 30
