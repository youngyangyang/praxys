name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'analysis/**'
      - 'sync/**'
      - 'db/**'
      - 'data/science/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/deploy-backend.yml'
    tags:
      - 'api-*'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Stamp build version
        # Write ``api/_build_version.txt`` so ``api.version.get_api_version()``
        # returns the deploy build instead of ``"develop"``. Mirrors the web
        # bundle's ``VITE_APP_VERSION`` injection — both surfaces show a
        # CalVer-ish synthetic version on auto-deploys, the stripped tag on
        # tagged releases (``api-YYYY.MM.MICRO`` → ``YYYY.MM.MICRO``).
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" == api-* ]]; then
            VERSION="${GITHUB_REF_NAME#api-}"
          else
            VERSION="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi
          echo "${VERSION}" > api/_build_version.txt
          echo "Build version: ${VERSION}"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: trainsight-app
          resource-group-name: rg-trainsight
