name: Deploy Frontend to App Service (praxys-frontend)

# Region-pinned static SPA host in East Asia (the "F4" perf fix —
# replaced the SWA-Amsterdam path that added 200-300ms RTT for CN
# users). Both this site and trainsight-app share plan-trainsight at
# $0 incremental.
#
# Auth: same OIDC Service Principal as deploy-backend.yml
# (AZURE_CLIENT_ID/TENANT/SUBSCRIPTION secrets, RG-scoped role).

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'frontend_server/**'
      - '.github/workflows/deploy-frontend-appservice.yml'
    tags:
      - 'web-*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install frontend_server deps + pytest
        # Only the static-server's runtime deps (~30 MB) plus pytest —
        # not the backend's full requirements. Keeps this job fast.
        run: |
          pip install -r frontend_server/requirements-frontend.txt
          pip install pytest httpx
      - name: Run frontend_server tests
        run: python -m pytest tests/test_frontend_server_spa.py -v

  build_and_deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Compute build version
        # Synthetic CalVer-ish version baked into the bundle and
        # surfaced by the Settings footer. Matches the mini-program
        # publish workflow so all three surfaces (web / api /
        # miniapp) read identically. Tagged releases ``web-YYYY.MM.MICRO``
        # strip the prefix so the displayed string matches the tag.
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" == web-* ]]; then
            VERSION="${GITHUB_REF_NAME#web-}"
          else
            VERSION="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Build version: ${VERSION}"

      - name: Build web bundle
        working-directory: web
        # --legacy-peer-deps because vite-plugin-pwa@1.2 declares older
        # peer ranges than vite@8 (already documented in web/.npmrc).
        run: |
          npm ci --legacy-peer-deps
          npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ vars.VITE_APPINSIGHTS_CONNECTION_STRING }}
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Stage deploy package
        # The deploy zip mirrors the repo layout that frontend_server.main
        # expects: ``frontend_server/`` and ``web/dist/`` as siblings of
        # ``requirements.txt`` so Oryx installs only the static-server's
        # minimal deps (FastAPI + uvicorn), not the backend's full set.
        run: |
          mkdir -p deploy-pkg/web
          cp -r frontend_server deploy-pkg/
          cp -r web/dist deploy-pkg/web/dist
          cp frontend_server/requirements-frontend.txt deploy-pkg/requirements.txt
          ls -R deploy-pkg | head -50

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to praxys-frontend
        uses: azure/webapps-deploy@v3
        with:
          app-name: praxys-frontend
          resource-group-name: rg-trainsight
          package: deploy-pkg
