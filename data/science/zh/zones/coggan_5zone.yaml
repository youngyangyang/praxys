id: coggan_5zone
pillar: zones
name: Coggan 5 区模型
author: system
description: 基于 Coggan 功率训练水平推导出的经典 5 区模型。各区间按阈值（CP、LTHR 或阈值配速）的比例定义。结构化训练的行业标准。
simple_description: 根据您的阈值（CP、乳酸阈值心率或阈值配速）将训练强度划分为 5 个区间。每个区间针对不同的生理适应——从轻松恢复跑到全力间歇。这是大多数教练和训练平台使用的标准系统。
advanced_description: '## Coggan 5 区模型


  四个边界比例定义了跨三项指标的 5 个区间：


  **功率区间**（CP 的比例）：

  | 区间 | 名称 | 范围 | 目标 % |

  |------|------|-------|----------|

  | 1 | 恢复 | < 55% CP | 5% |

  | 2 | 耐力 | 55–75% CP | 70% |

  | 3 | 节奏跑 | 75–90% CP | 10% |

  | 4 | 乳酸阈 | 90–105% CP | 10% |

  | 5 | VO2max | > 105% CP | 5% |


  目标分布遵循 ~75/10/15 的模式（轻松/中等/高强度），

  这一模式已被 Seiler (2006, 2010) 支持，并由 Filipas et al. (2022) 在跑步中证实。


  **心率区间**（LTHR 的比例）：[0.72, 0.82, 0.89, 0.96]


  **配速区间**（阈值配速的比例，反向）：[1.29, 1.14, 1.06, 1.00]

  （数值越高 = 相对于阈值配速越慢）


  **参考文献：**

  - Coggan (2012) *Training and Racing with a Power Meter*

  - Seiler (2006) "Quantifying training intensity distribution in elite endurance
  athletes"

  - Filipas et al. (2022) "Effects of pyramidal and polarized training in well-trained
  endurance runners"'
