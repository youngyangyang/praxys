id: pyramidal_3zone
pillar: zones
name: 金字塔式 3 区模型
author: system
description: 一种金字塔式 3 区强度分布模型：约 75% 轻松，约 15% 中等/节奏跑，约 10% 高强度。与极化训练不同，这种模型允许在乳酸阈附近投入相当多的时间，这可能有助于为节奏跑需求较重的比赛做准备的训练有素跑者。
simple_description: 训练分布呈金字塔形：大部分时间轻松进行（约 75%），一部分具有意义的时间处于中等/节奏跑强度（约 15%），较小一部分为高强度（约
  10%）。与极化训练相比，金字塔式允许更多乳酸阈训练；一些研究表明，这对训练有素的跑者同样有效，并且可能更好地为您备战半程马拉松和马拉松这类持续用力的比赛。
advanced_description: "## 金字塔式 3 区模型\n\n基于通气阈值（VT1/VT2）的三个区间，与极化模型的边界相同，但目标分布不同：\n\
  \n**边界比例：**\n- 功率：CP 的 [0.82, 1.00]\n- 心率：LTHR 的 [0.82, 0.89]\n- 配速：乳酸阈配速的 [1.14,\
  \ 1.00]\n\n**目标训练分布：**\n| 区间 | 名称 | 目标 % |\n|------|------|----------|\n| 1 | 轻松（低于\
  \ VT1） | 75% |\n| 2 | 中等（VT1-VT2） | 15% |\n| 3 | 高强度（高于 VT2） | 10% |\n\n金字塔式模型之所以得名，源于其强度分布的形状：轻松训练构成宽阔的底座，中等训练构成中间层，而高强度训练则形成狭窄的顶端。与极化训练的关键区别在于，它将更多训练分配给区间\
  \ 2（中等/节奏跑），而相应减少了区间 3（高强度）。\n\nEsteve-Lanao 等人（2007）显示，采用金字塔式分布的次精英跑者，比采用更偏乳酸阈的训练方式提升了更多的\
  \ 10K 比赛成绩。Filipas 等人（2022）发现，在 16 周内，金字塔式和极化式分布在训练有素的跑者身上带来了相似的提升，说明这两种方法都可能有效，具体取决于个人反应和比赛需求。\n\
  \n**何时考虑金字塔式而非极化式：**\n- 为持续用力项目做准备（半程马拉松、马拉松）\n- 对节奏跑/乳酸阈训练反应良好\n- 已具备良好的有氧基础且训练水平较高\n\
  \n**参考文献：**\n- Esteve-Lanao 等人（2007）\"How do endurance runners actually train?\"\
  \n  *Medicine & Science in Sports & Exercise*\n- Filipas 等人（2022）\"Effects of 16\
  \ weeks of pyramidal and polarized\n  training intensity distributions in well-trained\
  \ endurance runners,\"\n  *Scandinavian Journal of Medicine & Science in Sports*\n\
  - Stöggl & Sperlich（2014）\"Polarized training has greater impact on key\n  endurance\
  \ variables,\" *Frontiers in Physiology*"
