id: polarized_3zone
pillar: zones
name: Seiler 极化 3 区模型
author: system
description: 基于通气阈值（VT1/VT2）的 Seiler 3 区极化模型。强调 80% 轻松、5% 中等、15% 高强度的分布。得到针对精英耐力运动员研究的支持。
simple_description: 只用 3 个区，并采用一个简单规则：大约 80% 的训练轻松进行，5% 中等，15% 高强度。针对精英运动员的研究表明，这种分布在将受伤风险降至最低的同时，能带来最佳提升。关键是避开“中等”区——它恢复起来太难，但又不足以带来大幅适应。
advanced_description: "## Seiler 极化 3 区模型\n\n基于通气阈值（VT1/VT2）的三个区：\n\n**边界比例：**\n-\
  \ 功率：CP 的 [0.82, 1.00]\n- 心率：LTHR 的 [0.82, 0.89]\n- 配速：阈值配速的 [1.14, 1.00]\n\n**目标训练分布：**\n\
  | 区 | 名称 | 目标 % |\n|------|------|----------|\n| 1 | 轻松（低于 VT1） | 80% |\n| 2 | 中等（VT1–VT2）\
  \ | 5% |\n| 3 | 高强度（高于 VT2） | 15% |\n\n极化模型会尽量减少在第 2 区的时间（“黑洞”训练），因为这一区间会产生明显疲劳，却缺乏带来顶级适应所需的刺激。\n\
  \n**参考文献：**\n- Seiler & Kjerland (2006) \"Quantifying training intensity distribution\
  \ in elite\n  endurance athletes,\" *SJMSS*\n- Stöggl & Sperlich (2014) \"Polarized\
  \ training has greater impact on key endurance\n  variables,\" *Frontiers in Physiology*"
