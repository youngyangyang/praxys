id: critical_power
pillar: prediction
name: 阈值功率模型
author: system
description: 使用阈值功率作为主要预测因子，并采用 Stryd 模型中按比赛距离划分的功率-时长比例。当有功率数据和 CP 估计值时效果最佳。
simple_description: 使用您的阈值功率（CP）来预测比赛成绩——这是您大约能持续一小时的最高功率。对于每个比赛距离，都有一个已知的 CP 比例，顶尖跑者可以维持这个比例。您的预测时间来自您的
  CP、这个比例，以及您的功率-配速关系。
advanced_description: '## 阈值功率预测模型


  **功率-时长模型：** P = CP + W''/t


  其中 CP 是阈值功率（可持续约 60 分钟），W'' 是高于 CP 的有限

  做功能力。


  **比赛功率比例（来自 Stryd）：**

  | 距离 | CP 百分比 |

  |----------|---------|

  | 5K | 103.8% |

  | 10K | 100.0% |

  | Half Marathon | 94.6% |

  | Marathon | 89.9% |

  | 50K | 88.0% |

  | 50 Mile | 85.0% |

  | 100K | 82.0% |

  | 100 Mile | 78.0% |


  当功率到配速的

  查找不可用时，使用 Riegel 指数（1.06）作为配速缩放的后备方案。


  **参考文献：**

  - Monod & Scherrer (1965) "The work capacity of a synergic muscular group," *Ergonomics*

  - Stryd Race Power Calculator'
