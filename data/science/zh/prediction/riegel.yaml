id: riegel
pillar: prediction
name: Riegel 公式
author: system
description: 经验性的配速缩放公式：T2 = T1 x (D2/D1)^1.06。适用于已知任意距离的比赛时间。最适合缺少功率数据、基于配速/心率的运动员。
simple_description: 通过对已知成绩进行缩放来预测比赛时间。如果您跑过 10K，它可以根据配速在更长距离上自然放缓的规律，估算您的半程马拉松时间。简单，而且对于标准公路距离来说出奇地准确。
advanced_description: "## Riegel 公式\n\n**公式：** T₂ = T₁ × (D₂/D₁)^1.06\n\n1.06 这个指数是经验得出的，来自对世界纪录和大型比赛数据库的分析。假设阈值配速\
  \ ≈ 10K 比赛配速。\n\n**准确范围：** 最适用于 5K 到马拉松距离。对于超长距离则可靠性较低，因为补给、地形和睡眠不足会引入非线性的减速因素。\n\
  \n**指数的个体差异：**\n- 精英运动员：~1.08（更受耐力限制）\n- 休闲跑者：~1.06（标准）\n\n**参考文献：**\n- Riegel (1977)\
  \ \"Athletic Records and Human Endurance,\" *American Scientist*\n- Vickers & Vertosick\
  \ (2016) \"An Empirical Study of Race Times in Recreational\n  Running,\" *BMC Sports\
  \ Science*"
